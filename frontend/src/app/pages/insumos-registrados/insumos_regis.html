<div class="register-container">
  <div class="register-card">

    <!-- HEADER -->
    <div class="register-header">
      <h2>Registro de Insumo</h2>
      <p>Ingrese los detalles del nuevo insumo</p>
    </div>

    <!-- FORMULARIO REACTIVO -->
    <form 
      [formGroup]="insumoForm"
      (ngSubmit)="onSubmit()" 
      class="register-form">

      <!-- Código interno -->
      <div class="form-group">

        <label for="codigo_interno">
          Código Interno
        </label>

        <input 
          type="text" 
          id="codigo_interno"
          formControlName="codigo_interno"
          placeholder="Ej: AG-15"
        >

      </div>


      <!-- Nombre -->
      <div class="form-group">

        <label for="nombre">
          Nombre
        </label>

        <input 
          type="text" 
          id="nombre"
          formControlName="nombre"
          placeholder="Ej: Aguja #15"
        >

      </div>


      <!-- Stock mínimo -->
      <div class="form-group">

        <label for="stock_minimo">
          Stock Mínimo
        </label>

        <input 
          type="number" 
          id="stock_minimo"
          formControlName="stock_minimo"
          placeholder="Ej: 50"
          min="0"
        >

      </div>


      <!-- MENSAJES DE ERROR -->
      @if (errorMessage) {
        <p class="error-text">
          {{ errorMessage }}
        </p>
      }

      <!-- MENSAJES DE ÉXITO -->
      @if (successMessage) {
        <p class="success-text">
          {{ successMessage }}
        </p>
      }


      <!-- BOTÓN -->
      <button 
        type="submit" 
        class="btn-register"
        [disabled]="insumoForm.invalid">

        Registrar Insumo

      </button>

    </form>

  </div>
</div>
